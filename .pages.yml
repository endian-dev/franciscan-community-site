settings:
  content:
    merge: true
  commit:
    identity: app
    templates:
      create: "content(create): {path}"
      update: "content(update): {path}"
      delete: "content(delete): {path}"
      rename: "content(rename): {oldPath} -> {newPath}"

media:
  - name: images
    label: Images
    input: public/uploads/images
    output: /uploads/images
    categories: [image]
    extensions: [webp, jpg, jpeg, png]
    rename: safe
  - name: documents
    label: Documents
    input: public/uploads/documents
    output: /uploads/documents
    categories: [document]
    extensions: [pdf]
    rename: safe

content:
  - name: site_settings
    label: Site settings
    type: file
    path: src/data/site.json
    format: json
    operations:
      create: false
      delete: false
    fields:
      - name: name
        label: Site name
        type: string
        required: true
      - name: description
        label: Site description
        type: text
        required: true
      - name: homeHero
        label: Home hero media
        type: object
        required: true
        fields:
          - name: image
            label: Hero image
            type: image
            description: Optional approved image for the home-page hero. Leave empty until an approved asset is ready.
            options:
              media: images
              extensions: [webp, jpg, jpeg, png]
              rename: safe
          - name: imageAlt
            label: Hero image alt text
            type: string
            description: Required when a hero image is selected.
      - name: contact
        label: Contact
        type: object
        required: true
        fields:
          - name: name
            label: Contact name
            type: string
            required: true
          - name: email
            label: Email
            type: string
            required: true
          - name: phone
            label: Phone
            type: string
            required: true
          - name: address
            label: Address
            type: object
            required: true
            fields:
              - name: street
                label: Street
                type: string
                required: true
              - name: city
                label: City
                type: string
                required: true
              - name: region
                label: State
                type: string
                required: true
              - name: postalCode
                label: ZIP code
                type: string
                required: true
      - name: footer
        label: Footer
        type: object
        required: true
        fields:
          - name: text
            label: Footer text
            type: string
            required: true

  - name: pages
    label: Fixed pages
    type: collection
    path: src/content/pages
    format: yaml-frontmatter
    operations:
      create: false
      rename: false
      delete: false
    view:
      primary: title
      sort: navOrder
      order: asc
      fields: [route, navLabel]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: route
        label: Route
        type: string
        required: true
        readonly: true
      - name: navLabel
        label: Navigation label
        type: string
        required: true
      - name: navOrder
        label: Navigation order
        type: number
        required: true
      - name: description
        label: SEO description
        type: text
      - name: body
        label: Body
        type: rich-text
        options:
          format: markdown
          media: images
          extensions: [webp, jpg, jpeg, png]
          path: "."
          rename: safe

  - name: faqs
    label: FAQ entries
    type: collection
    path: src/content/faqs
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: question
      sort: order
      order: asc
      fields: [published]
    fields:
      - name: question
        label: Question
        type: string
        required: true
      - name: order
        label: Display order
        type: number
        required: true
      - name: published
        label: Published
        type: boolean
      - name: body
        label: Answer
        type: rich-text
        options:
          format: markdown
          media: images
          extensions: [webp, jpg, jpeg, png]
          path: "."
          rename: safe

  - name: resources
    label: News and resources
    type: collection
    path: src/content/resources
    format: yaml-frontmatter
    filename:
      template: "{primary}.md"
      field: create
    view:
      primary: title
      sort: order
      order: asc
      fields: [published, externalUrl, uploadedFile]
    fields:
      - name: title
        label: Title
        type: string
        required: true
      - name: order
        label: Display order
        type: number
        required: true
      - name: linkLabel
        label: Link label
        type: string
      - name: uploadedFile
        label: Uploaded document
        type: file
        options:
          media: documents
          extensions: [pdf]
          rename: safe
      - name: externalUrl
        label: External URL
        type: string
        pattern:
          regex: "^$|^https?://"
          message: "Use an http(s) URL or leave this blank."
      - name: published
        label: Published
        type: boolean
      - name: body
        label: Description
        type: rich-text
        options:
          format: markdown
          media: images
          extensions: [webp, jpg, jpeg, png]
          path: "."
          rename: safe
